name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  backend:
    name: Backend smoke tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install Python dependencies
        run: pip install -r backend/requirements.txt

      - name: Train model
        run: python backend/train.py

      - name: Start backend server
        run: |
          cd backend
          python run.py &
          echo "SERVER_PID=$!" >> "$GITHUB_ENV"
          sleep 5

      - name: Health check
        run: |
          curl -sf http://127.0.0.1:5000/api/health | \
            python -c "import sys,json; d=json.load(sys.stdin); assert d['status']=='healthy', d"

      - name: Home endpoint check
        run: |
          curl -sf http://127.0.0.1:5000/ | \
            python -c "import sys,json; d=json.load(sys.stdin); assert 'message' in d, d"

      - name: Predict endpoint smoke test
        run: |
          curl -sf -X POST http://127.0.0.1:5000/predict \
            -H "Content-Type: application/json" \
            -d '{"Weather Conditions": "Clear", "Road Condition": "Dry", "Lighting Conditions": "Daylight"}' | \
            python -c "import sys,json; d=json.load(sys.stdin); assert 'severity' in d, d"

      - name: Stats endpoint check
        run: |
          curl -sf http://127.0.0.1:5000/api/stats | \
            python -c "import sys,json; d=json.load(sys.stdin); assert 'model_type' in d, d"

      - name: Stop backend server
        if: always()
        run: kill "$SERVER_PID" 2>/dev/null || true

  frontend:
    name: Frontend install check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/traffic-prediction/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend/traffic-prediction

      - name: Build frontend
        run: npm run build
        working-directory: frontend/traffic-prediction
